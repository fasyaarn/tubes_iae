<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBrain - Articles</title>
    <style>
        /* --- RESET & VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #F8FAFC;
            color: #1E293B;
            padding-top: 90px; /* Jarak pas agar konten tidak tertutup navbar */
        }

        /* --- GLOBAL NAVBAR --- */
        .navbar {
            background-color: #ffffff;
            border-bottom: 2px solid #E2E8F0;
            padding: 0 40px;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            cursor: pointer;
        }

        .nav-logo {
            font-size: 26px;
        }

        .nav-brand-text h1 {
            font-size: 18px;
            color: #C31F1F;
            font-weight: 700;
            line-height: 1;
        }

        .nav-brand-text p {
            font-size: 10px;
            color: #64748B;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-top: 2px;
        }

        /* Center / Right: Navigasi Menu Layanan Terintegrasi di Navbar */
        .nav-menu-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link-item {
            color: #475569;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-link-item:hover {
            background: #F1F5F9;
            color: #0F172A;
        }

        .nav-link-item.active {
            background: #FEE2E2;
            color: #991B1B;
        }

        /* Sisi Kanan: Profile Box */
        .nav-right-side {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-profile-box {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #F1F5F9;
            padding: 6px 14px;
            border-radius: 12px;
            border: 1px solid #E2E8F0;
        }

        .user-greeting {
            font-size: 14px;
            color: #475569;
        }

        .user-greeting strong {
            color: #0F172A;
            font-weight: 600;
        }

        .role-badge {
            background: #E0E7FF;
            color: #3730A3;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .logout-btn {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FCA5A5;
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #FCA5A5;
        }

        /* --- MAIN CONTENT AREA (FULL WIDTH Tanpa Sidebar) --- */
        .main-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 32px 40px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .title-area h2 {
            font-size: 26px;
            font-weight: 700;
            color: #0F172A;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title-area p {
            font-size: 14px;
            color: #64748B;
            margin-top: 4px;
        }

        .search-box {
            width: 320px;
        }

        .search-box input {
            width: 100%;
            padding: 11px 18px;
            border: 1px solid #CBD5E1;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        .search-box input:focus {
            border-color: #C31F1F;
        }

        /* --- ARTICLES GRID & CARDS --- */
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
        }

        .article-card {
            background: #ffffff;
            border-radius: 14px;
            border: 1px solid #E2E8F0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .article-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.06);
        }

        .article-card.read {
            border-left: 5px solid #10B981;
        }

        .article-card.unread {
            border-left: 5px solid #EF4444;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .category-badge {
            background: #F1F5F9;
            color: #475569;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .status-badge.status-read {
            background: #D1FAE5;
            color: #065F46;
        }

        .status-badge.status-unread {
            background: #FEE2E2;
            color: #991B1B;
        }

        .card-body h3 {
            font-size: 18px;
            font-weight: 700;
            color: #0F172A;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .card-body p {
            font-size: 14px;
            color: #64748B;
            line-height: 1.6;
            margin-bottom: 24px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #E2E8F0;
            background: #F8FAFC;
            color: #334155;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #F1F5F9;
            border-color: #CBD5E1;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/" class="nav-brand">
            <span class="nav-logo">🎓</span>
            <div class="nav-brand-text">
                <h1>EduBrain</h1>
                <p>TELKOM UNIVERSITY</p>
            </div>
        </a>

        <!-- MENU SERVICES DI TENGAH NAVBAR -->
        <div class="nav-menu-links">
            <a href="/courses" class="nav-link-item">Courses</a>
            <a href="/articles" class="nav-link-item active">Articles</a>
            <a href="/form-discussion" class="nav-link-item">Discussion</a>
            <a href="/enrollments" class="nav-link-item">My Enrollments</a>
            <a href="/attendance" class="nav-link-item">Attendance</a>
        </div>

        <!-- PROFILE & LOGOUT SISI KANAN -->
        <div class="nav-right-side">
            <div class="user-profile-box">
                <span class="user-greeting">Hi, <strong id="nav-username">Loading...</strong></span>
                <span id="nav-role-badge" class="role-badge">STUDENT</span>
            </div>
            <button onclick="handleLogout()" class="logout-btn">Log out</button>
        </div>
    </nav>

    <!-- CONTENT AREA -->
    <main class="main-container">
        <div class="header-content">
            <div class="title-area">
                <h2>📰 Articles</h2>
                <p>Read articles to unlock course attendance</p>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search articles..." oninput="filterArticles()">
            </div>
        </div>

        <div class="articles-grid" id="articles-container">
            <!-- Dynamic data injected here -->
        </div>
    </main>

    <!-- SCRIPT LOGIC ENGINE -->
    <script>
        const GRAPHQL_URL = window.location.origin + '/graphql';
        let allArticles = [];

        document.addEventListener("DOMContentLoaded", () => {
            checkAuthSession();
            fetchArticlesData();
        });

        function checkAuthSession() {
            const userData = localStorage.getItem('user');
            if (userData) {
                const user = JSON.parse(userData);
                document.getElementById('nav-username').textContent = user.name || 'User';
                document.getElementById('nav-role-badge').textContent = user.role || 'STUDENT';
            } else {
                window.location.href = '/auth';
            }
        }

        async function fetchArticlesData() {
            const query = `
                query GetArticles {
                    articles {
                        id
                        title
                        content
                        category
                        isRead
                    }
                }
            `;

            try {
                const response = await fetch(GRAPHQL_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ query })
                });

                const result = await response.json();
                if (result.data && result.data.articles) {
                    allArticles = result.data.articles;
                    renderArticles(allArticles);
                }
            } catch (error) {
                console.error("Failed to load articles:", error);
                // Fallback Mock Data agar UI tidak kosong saat development offline
                allArticles = [
                    { id: "1", title: "Pengantar Web Programming", content: "Web programming adalah proses membuat aplikasi atau halaman web yang dapat diakses melalui browser...", category: "Advanced Web Programming", isRead: true },
                    { id: "2", title: "Dasar-Dasar Sistem Basis Data", content: "Sistem Basis Data (Database Systems) adalah cara terorganisir untuk menyimpan, mengelola, dan mengambil informasi...", category: "Database Systems", isRead: true },
                    { id: "3", title: "Pengantar Jaringan Komputer", content: "Jaringan komputer memungkinkan perangkat saling berkomunikasi dan berbagi sumber daya. Model OSI & TCP/IP...", category: "Computer Networks", isRead: false }
                ];
                renderArticles(allArticles);
            }
        }

        function renderArticles(articles) {
            const container = document.getElementById('articles-container');
            container.innerHTML = '';

            if(articles.length === 0) {
                container.innerHTML = `<p style="color: #64748B; font-style: italic; grid-column: 1/-1;">No articles found.</p>`;
                return;
            }

            articles.forEach(article => {
                const card = document.createElement('div');
                card.className = `article-card ${article.isRead ? 'read' : 'unread'}`;
                
                card.innerHTML = `
                    <div>
                        <div class="card-top">
                            <span class="category-badge">${article.category}</span>
                            <span class="status-badge ${article.isRead ? 'status-read' : 'status-unread'}">
                                ${article.isRead ? '✅ Read' : '📖 Unread'}
                            </span>
                        </div>
                        <div class="card-body">
                            <h3>${article.title}</h3>
                            <p>${article.content}</p>
                        </div>
                    </div>
                    <div>
                        <button class="action-btn" onclick="handleArticleAction('${article.id}', ${article.isRead})">
                            ${article.isRead ? '👁️ View' : '📖 Read'}
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function handleArticleAction(articleId, isRead) {
            if (isRead) {
                window.location.href = `/articles/view/${articleId}`;
            } else {
                const mutation = `
                    mutation MarkAsRead($id: ID!) {
                        markArticleAsRead(id: $id) {
                            id
                            isRead
                        }
                    }
                `;
                try {
                    await fetch(GRAPHQL_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('token')}`
                        },
                        body: JSON.stringify({ query: mutation, variables: { id: articleId } })
                    });
                    
                    const target = allArticles.find(a => a.id === articleId);
                    if(target) target.isRead = true;
                    renderArticles(allArticles);

                } catch (err) {
                    console.error("Mutation failed:", err);
                }
            }
        }

        function filterArticles() {
            const keyword = document.getElementById('search-input').value.toLowerCase();
            const filtered = allArticles.filter(article => 
                article.title.toLowerCase().includes(keyword) || 
                article.content.toLowerCase().includes(keyword) ||
                article.category.toLowerCase().includes(keyword)
            );
            renderArticles(filtered);
        }

        function handleLogout() {
            localStorage.clear();
            window.location.href = '/auth';
        }
    </script>
</body>
</html>
