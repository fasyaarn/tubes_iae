<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBrain - Course Articles</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel-bg: rgba(30, 41, 59, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 1.5rem 2rem;
            border-radius: 16px;
            backdrop-filter: blur(12px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            border: none;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--panel-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        .user-badge {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: 1fr 2fr;
            }
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #e2e8f0;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        input, textarea, select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--accent);
        }

        select option {
            background: #1e293b;
            color: white;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }
        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #a7f3d0;
        }

        /* Article list items */
        .article-item {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .article-item:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .article-info {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .article-title-text {
            font-weight: 600;
            color: white;
        }

        .article-course-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .read-badge {
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-read {
            background: rgba(16, 185, 129, 0.15);
            color: #a7f3d0;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .badge-unread {
            background: rgba(245, 158, 11, 0.15);
            color: #fde68a;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        /* Reader Panel */
        .reader-content {
            line-height: 1.7;
            color: #cbd5e1;
            font-size: 1rem;
            white-space: pre-line;
            border-top: 1px solid var(--panel-border);
            padding-top: 1.5rem;
        }

        .reader-placeholder {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span>📖</span> EduBrain Articles
            </div>
            <div class="nav-links">
                <a href="/" class="btn btn-secondary">Portal Gateway</a>
                <span id="user-badge" class="user-badge">Checking Auth...</span>
                <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
            </div>
        </header>

        <div id="alert-box" class="alert"></div>

        <div class="grid">
            <!-- Left panel: Form (Admin) or List (Student) -->
            <div style="display: flex; flex-direction: column; gap: 2rem;">
                <!-- Article Form (Admin only) -->
                <div class="card" id="form-card" style="display: none;">
                    <div class="card-title" id="form-title">Create Article</div>
                    <form id="article-form" onsubmit="handleFormSubmit(event)">
                        <input type="hidden" id="article-id">
                        <div class="form-group">
                            <label for="title">Title</label>
                            <input type="text" id="title" required placeholder="e.g. Pengantar Web">
                        </div>
                        <div class="form-group">
                            <label for="course-select">Link to Course</label>
                            <select id="course-select" required>
                                <option value="">-- Choose Course --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="content">Content (Markdown / Text)</label>
                            <textarea id="content" rows="8" required placeholder="Type article body..."></textarea>
                        </div>
                        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                            <button type="submit" class="btn btn-primary" style="flex: 2;">Save</button>
                            <button type="button" onclick="resetForm()" class="btn btn-secondary" style="flex: 1;">Cancel</button>
                        </div>
                    </form>
                </div>

                <!-- Articles Directory List -->
                <div class="card">
                    <div class="card-title">
                        Directory
                        <span id="admin-add-badge"></span>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 1rem;" id="article-list-container">
                        <!-- Loaded dynamically -->
                    </div>
                </div>
            </div>

            <!-- Right panel: Reader Screen -->
            <div class="card" id="reader-card">
                <div class="card-title" id="reader-title">Article Reader</div>
                <div id="reader-body">
                    <div class="reader-placeholder">Select an article from the directory list to open and read.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GRAPHQL_URL = window.location.port === '5000' ? '/articles/graphql' : '/graphql'; // gateway path or direct port 5006 path

        const token = localStorage.getItem('token');
        const userStr = localStorage.getItem('user');
        let currentUser = null;
        let courseMap = new Map();

        if (!token || !userStr) {
            window.location.href = '/auth';
        } else {
            currentUser = JSON.parse(userStr);
            document.getElementById('user-badge').textContent = `${currentUser.name} (${currentUser.role})`;
            
            if (currentUser.role === 'admin') {
                document.getElementById('form-card').style.display = 'flex';
                document.getElementById('admin-add-badge').innerHTML = `<button onclick="resetForm()" class="btn btn-primary btn-sm">+ Create</button>`;
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/auth';
        }

        function showAlert(message, type = 'success') {
            const alertBox = document.getElementById('alert-box');
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 4000);
        }

        async function fetchGraphQL(url, query, variables = {}) {
            try {
                let targetUrl = url;
                if (window.location.port !== '5000') {
                    if (url.startsWith('/courses')) targetUrl = 'http://localhost:5003/graphql';
                    else if (url.startsWith('/articles')) targetUrl = 'http://localhost:5006/graphql';
                    else if (url.startsWith('/enrollments')) targetUrl = 'http://localhost:5004/graphql';
                }
                const response = await fetch(targetUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ query, variables })
                });
                const result = await response.json();
                if (result.errors) {
                    throw new Error(result.errors[0].message);
                }
                return result.data;
            } catch (err) {
                showAlert(err.message, 'error');
                console.error(err);
            }
        }

        // Initialize courses lookup maps
        async function loadCourses() {
            const query = `query { courses { id title } }`;
            const data = await fetchGraphQL('/courses/graphql', query);
            if (!data) return;

            const select = document.getElementById('course-select');
            data.courses.forEach(c => {
                courseMap.set(c.id, c.title);
                if (currentUser.role === 'admin') {
                    const opt = document.createElement('option');
                    opt.value = c.id;
                    opt.textContent = c.title;
                    select.appendChild(opt);
                }
            });
        }

        const enrolledCourseIds = new Set();

        async function loadStudentEnrollments() {
            if (currentUser.role !== 'student') return;
            const query = `
                query GetStudentEnrollments($student_id: ID!) {
                    studentEnrollments(student_id: $student_id) {
                        course_id
                        status
                    }
                }
            `;
            const data = await fetchGraphQL('/enrollments/graphql', query, { student_id: currentUser.id });
            if (data && data.studentEnrollments) {
                enrolledCourseIds.clear();
                data.studentEnrollments.forEach(e => {
                    if (e.status === 'active' || e.status === 'completed') {
                        enrolledCourseIds.add(e.course_id.toString());
                    }
                });
            }
        }

        // Load Articles
        async function loadArticles() {
            const query = `
                query {
                    articles {
                        id
                        title
                        content
                        course_id
                        is_read
                    }
                }
            `;
            const data = await fetchGraphQL(GRAPHQL_URL, query);
            if (!data) return;

            const container = document.getElementById('article-list-container');
            container.innerHTML = '';

            let articlesToShow = data.articles;
            if (currentUser.role === 'student') {
                articlesToShow = data.articles.filter(art => enrolledCourseIds.has(art.course_id.toString()));
            }

            if (articlesToShow.length === 0) {
                container.innerHTML = `<div style="text-align: center; color: var(--text-secondary);">No articles available. (You must be enrolled in a course to see its articles)</div>`;
                return;
            }

            articlesToShow.forEach(art => {
                const courseTitle = courseMap.get(art.course_id.toString()) || `Course #${art.course_id}`;
                const div = document.createElement('div');
                div.className = 'article-item';
                div.onclick = () => openReader(art);

                let badge = '';
                if (currentUser.role === 'student') {
                    badge = art.is_read 
                        ? `<span class="read-badge badge-read">Read</span>` 
                        : `<span class="read-badge badge-unread">Unread</span>`;
                }

                div.innerHTML = `
                    <div class="article-info">
                        <div class="article-title-text">${art.title}</div>
                        <div class="article-course-text">📖 ${courseTitle}</div>
                    </div>
                    <div>${badge}</div>
                `;
                container.appendChild(div);
            });
        }

        // Open Reader
        async function openReader(art) {
            if (currentUser.role === 'student' && !enrolledCourseIds.has(art.course_id.toString())) {
                showAlert('You must enroll in the course to read this article.', 'error');
                return;
            }
            const readerTitle = document.getElementById('reader-title');
            const readerBody = document.getElementById('reader-body');
            const courseTitle = courseMap.get(art.course_id.toString()) || `Course #${art.course_id}`;

            readerTitle.innerHTML = `
                <div>
                    <div>${art.title}</div>
                    <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem;">Course: ${courseTitle}</div>
                </div>
                ${currentUser.role === 'admin' ? `
                    <div class="action-btns">
                        <button class="btn btn-secondary btn-sm" onclick="editArticle(${JSON.stringify(art).replace(/"/g, '&quot;')})">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteArticle(${art.id})">Delete</button>
                    </div>
                ` : ''}
            `;

            readerBody.innerHTML = `
                <div class="reader-content">
                    ${art.content}
                </div>
            `;

            // If user is student, automatically mark as read
            if (currentUser.role === 'student' && !art.is_read) {
                const mutation = `
                    mutation MarkAsRead($article_id: ID!) {
                        markAsRead(article_id: $article_id)
                    }
                `;
                const success = await fetchGraphQL(GRAPHQL_URL, mutation, { article_id: art.id });
                if (success) {
                    // Refresh logs to update badges
                    loadArticles();
                }
            }
        }

        // Form Resets
        function resetForm() {
            document.getElementById('article-form').reset();
            document.getElementById('article-id').value = '';
            document.getElementById('form-title').textContent = 'Create Article';
        }

        function editArticle(art) {
            document.getElementById('article-id').value = art.id;
            document.getElementById('title').value = art.title;
            document.getElementById('course-select').value = art.course_id;
            document.getElementById('content').value = art.content;
            document.getElementById('form-title').textContent = `Edit Article #${art.id}`;
            document.getElementById('title').focus();
        }

        // Handle Admin Form Submit
        async function handleFormSubmit(event) {
            event.preventDefault();
            const id = document.getElementById('article-id').value;
            const title = document.getElementById('title').value;
            const course_id = document.getElementById('course-select').value;
            const content = document.getElementById('content').value;

            if (id) {
                const mutation = `
                    mutation UpdateArticle($id: ID!, $title: String!, $content: String!, $course_id: ID!) {
                        updateArticle(id: $id, title: $title, content: $content, course_id: $course_id) {
                            id
                        }
                    }
                `;
                const data = await fetchGraphQL(GRAPHQL_URL, mutation, { id, title, content, course_id });
                if (data) {
                    showAlert('Article updated successfully!');
                    resetForm();
                    loadArticles();
                }
            } else {
                const mutation = `
                    mutation CreateArticle($title: String!, $content: String!, $course_id: ID!) {
                        createArticle(title: $title, content: $content, course_id: $course_id) {
                            id
                        }
                    }
                `;
                const data = await fetchGraphQL(GRAPHQL_URL, mutation, { title, content, course_id });
                if (data) {
                    showAlert('Article created and published!');
                    resetForm();
                    loadArticles();
                }
            }
        }

        // Delete article
        async function deleteArticle(id) {
            if (!confirm('Are you sure you want to delete this article?')) return;
            const mutation = `
                mutation DeleteArticle($id: ID!) {
                    deleteArticle(id: $id)
                }
            `;
            const data = await fetchGraphQL(GRAPHQL_URL, mutation, { id });
            if (data && data.deleteArticle) {
                showAlert('Article deleted.');
                document.getElementById('reader-body').innerHTML = `<div class="reader-placeholder">Select an article from the directory list to open and read.</div>`;
                loadArticles();
            }
        }

        // Init loads
        async function init() {
            await loadCourses();
            await loadStudentEnrollments();
            await loadArticles();
        }

        init();
    </script>
</body>
</html>
