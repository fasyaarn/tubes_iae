<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBrain - Course Enrollments</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel-bg: rgba(30, 41, 59, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 1.5rem 2rem;
            border-radius: 16px;
            backdrop-filter: blur(12px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            border: none;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--panel-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        .user-badge {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: 1fr 2fr;
            }
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #e2e8f0;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        input, textarea, select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--accent);
        }

        select option {
            background: #1e293b;
            color: white;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            padding: 1rem;
            border-bottom: 2px solid var(--panel-border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--panel-border);
            font-size: 0.95rem;
            color: #cbd5e1;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .action-btns {
            display: flex;
            gap: 0.5rem;
        }

        .status-badge {
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: capitalize;
            display: inline-block;
        }
        .status-active {
            background: rgba(16, 185, 129, 0.15);
            color: #a7f3d0;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .status-completed {
            background: rgba(99, 102, 241, 0.15);
            color: #c7d2fe;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        .status-dropped {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }
        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #a7f3d0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span>📂</span> EduBrain Enrollments
            </div>
            <div class="nav-links">
                <a href="/" class="btn btn-secondary">Portal Gateway</a>
                <span id="user-badge" class="user-badge">Checking Auth...</span>
                <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
            </div>
        </header>

        <div id="alert-box" class="alert"></div>

        <div class="grid">
            <!-- Enroll Form -->
            <div class="card">
                <div class="card-title">New Course Enrollment</div>
                <form id="enroll-form" onsubmit="handleEnroll(event)">
                    <!-- Admin sees student select; student is locked to their own profile -->
                    <div class="form-group" id="student-select-group" style="display: none;">
                        <label for="student-select">Select Student</label>
                        <select id="student-select">
                            <option value="">-- Choose Student --</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="course-select">Select Course</label>
                        <select id="course-select" required>
                            <option value="">-- Choose Course --</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary" style="margin-top: 1rem; width: 100%;">Enroll in Course</button>
                </form>
            </div>

            <!-- Enrollments Table -->
            <div class="card">
                <div class="card-title">Enrollment Logs</div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Student</th>
                                <th>Course Title</th>
                                <th>Instructor</th>
                                <th>Status</th>
                                <th>Enrolled Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="enrollment-list-body">
                            <tr>
                                <td colspan="6" style="text-align: center; color: var(--text-secondary);">Loading logs...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GRAPHQL_URL = window.location.port === '5000' ? '/enrollments/graphql' : '/graphql'; // gateway path or direct port 5004 path

        const token = localStorage.getItem('token');
        const userStr = localStorage.getItem('user');
        let currentUser = null;

        if (!token || !userStr) {
            window.location.href = '/auth';
        } else {
            currentUser = JSON.parse(userStr);
            document.getElementById('user-badge').textContent = `${currentUser.name} (${currentUser.role})`;
            
            if (currentUser.role === 'admin') {
                document.getElementById('student-select-group').style.display = 'flex';
                document.getElementById('student-select').setAttribute('required', 'true');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/auth';
        }

        function showAlert(message, type = 'success') {
            const alertBox = document.getElementById('alert-box');
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 5000);
        }

        async function fetchGraphQL(url, query, variables = {}) {
            try {
                let targetUrl = url;
                if (window.location.port !== '5000') {
                    if (url.startsWith('/courses')) targetUrl = 'http://localhost:5003/graphql';
                    else if (url.startsWith('/students')) targetUrl = 'http://localhost:5002/graphql';
                    else if (url.startsWith('/enrollments')) targetUrl = 'http://localhost:5004/graphql';
                }
                const response = await fetch(targetUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ query, variables })
                });
                const result = await response.json();
                if (result.errors) {
                    throw new Error(result.errors[0].message);
                }
                return result.data;
            } catch (err) {
                showAlert(err.message, 'error');
                console.error(err);
            }
        }

        // Load courses dropdown (from Courses Service)
        async function loadCoursesDropdown() {
            const query = `query { courses { id title instructor } }`;
            const data = await fetchGraphQL('/courses/graphql', query);
            if (!data) return;

            const select = document.getElementById('course-select');
            data.courses.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = `${c.title} (${c.instructor})`;
                select.appendChild(opt);
            });
        }

        // Load students dropdown (from Students Service, Admin only)
        async function loadStudentsDropdown() {
            if (currentUser.role !== 'admin') return;
            const query = `query { students { id name email } }`;
            const data = await fetchGraphQL('/students/graphql', query);
            if (!data) return;

            const select = document.getElementById('student-select');
            data.students.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = `${s.name} (${s.email})`;
                select.appendChild(opt);
            });
        }

        // Load enrollment history
        async function loadEnrollments() {
            let query;
            let variables = {};
            
            if (currentUser.role === 'admin') {
                query = `
                    query {
                        enrollments {
                            id
                            student_id
                            course_id
                            status
                            enrolled_at
                            student {
                                name
                            }
                            course {
                                title
                                instructor
                            }
                        }
                    }
                `;
            } else {
                query = `
                    query GetStudentEnrollments($student_id: ID!) {
                        studentEnrollments(student_id: $student_id) {
                            id
                            student_id
                            course_id
                            status
                            enrolled_at
                            student {
                                name
                            }
                            course {
                                title
                                instructor
                            }
                        }
                    }
                `;
                variables = { student_id: currentUser.id };
            }

            const data = await fetchGraphQL(GRAPHQL_URL, query, variables);
            if (!data) return;

            const list = currentUser.role === 'admin' ? data.enrollments : data.studentEnrollments;
            const tbody = document.getElementById('enrollment-list-body');
            tbody.innerHTML = '';

            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--text-secondary);">No enrollments recorded.</td></tr>`;
                return;
            }

            list.forEach(e => {
                const studentName = e.student ? e.student.name : `Student #${e.student_id}`;
                const courseTitle = e.course ? e.course.title : `Course #${e.course_id}`;
                const instructor = e.course ? e.course.instructor : '-';
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: 500; color: #fff;">${studentName}</td>
                    <td>${courseTitle}</td>
                    <td>${instructor}</td>
                    <td><span class="status-badge status-${e.status}">${e.status}</span></td>
                    <td style="font-size: 0.85rem; color: var(--text-secondary);">${new Date(parseInt(e.enrolled_at) || e.enrolled_at).toLocaleDateString()}</td>
                    <td>
                        <div class="action-btns">
                            ${currentUser.role === 'admin' ? `
                                ${e.status === 'active' ? `
                                    <button onclick="updateStatus(${e.id}, 'completed')" class="btn btn-secondary btn-sm" style="padding: 0.3rem 0.6rem; font-size: 0.8rem; background: rgba(16, 185, 129, 0.1); color: #a7f3d0; border: 1px solid rgba(16,185,129,0.2);">Complete</button>
                                    <button onclick="updateStatus(${e.id}, 'dropped')" class="btn btn-danger btn-sm" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;">Drop</button>
                                ` : ''}
                                <button onclick="deleteEnrollment(${e.id})" class="btn btn-danger btn-sm" style="padding: 0.3rem 0.6rem; font-size: 0.8rem; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);">Delete</button>
                            ` : `
                                ${e.status === 'active' ? `
                                    <button onclick="deleteEnrollment(${e.id})" class="btn btn-danger btn-sm" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;">Drop Course</button>
                                ` : '-'}
                            `}
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Handle Form Submit
        async function handleEnroll(event) {
            event.preventDefault();
            const student_id = currentUser.role === 'admin' 
                ? document.getElementById('student-select').value 
                : currentUser.id;
            const course_id = document.getElementById('course-select').value;

            if (!student_id || !course_id) {
                showAlert('Please make your selections', 'error');
                return;
            }

            const mutation = `
                mutation CreateEnrollment($student_id: ID!, $course_id: ID!) {
                    createEnrollment(student_id: $student_id, course_id: $course_id) {
                        id
                    }
                }
            `;
            const data = await fetchGraphQL(GRAPHQL_URL, mutation, { student_id, course_id });
            if (data) {
                showAlert('Enrolled successfully!');
                document.getElementById('enroll-form').reset();
                loadEnrollments();
            }
        }

        // Update status (Admin only)
        async function updateStatus(id, status) {
            if (status === 'dropped' && !confirm('Dropping this course will completely clear the student\'s attendance and article reading progress. Continue?')) return;
            
            const mutation = `
                mutation UpdateEnrollmentStatus($id: ID!, $status: String!) {
                    updateEnrollmentStatus(id: $id, status: $status) {
                        id
                        status
                    }
                }
            `;
            const data = await fetchGraphQL(GRAPHQL_URL, mutation, { id, status });
            if (data) {
                showAlert(`Enrollment updated to ${status}!`);
                loadEnrollments();
            }
        }

        // Drop / Delete enrollment
        async function deleteEnrollment(id) {
            const msg = currentUser.role === 'admin' 
                ? 'Are you sure you want to delete this enrollment? This wipes all student progress!'
                : 'Are you sure you want to drop this course? This will wipe your attendance and article reads!';
            if (!confirm(msg)) return;

            const mutation = `
                mutation DeleteEnrollment($id: ID!) {
                    deleteEnrollment(id: $id)
                }
            `;
            const data = await fetchGraphQL(GRAPHQL_URL, mutation, { id });
            if (data && data.deleteEnrollment) {
                showAlert('Enrollment removed and progress wiped clean.');
                loadEnrollments();
            }
        }

        // Initializer
        loadCoursesDropdown();
        loadStudentsDropdown();
        loadEnrollments();
    </script>
</body>
</html>
