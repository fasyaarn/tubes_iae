<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBrain - Learning Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- GLOBAL STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #FFF3F3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- NAVBAR STYLES --- */
        .navbar {
            background-color: #ffffff;
            border-bottom: 2px solid #E5E7EB;
            padding: 0 40px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-logo {
            font-size: 24px;
        }

        .nav-brand-text h1 {
            font-size: 18px;
            color: #C31F1F;
            font-weight: 700;
            line-height: 1;
        }

        .nav-brand-text p {
            font-size: 10px;
            color: #8C94A3;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-top: 2px;
        }

        .nav-menu {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-item a {
            text-decoration: none;
            color: #6C757D;
            font-size: 15px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .nav-item a:hover {
            color: #C31F1F;
        }

        /* --- AUTH CONTAINER CARD STYLES --- */
        .page-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px 20px 40px 20px; /* Padding atas longgar agar tidak tertutup fixed navbar */
        }

        .auth-container {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0px 10px 30px rgba(219, 48, 48, 0.06);
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .brand-logo {
            font-size: 28px;
        }

        .brand-text h1 {
            font-size: 20px;
            color: #C31F1F;
            font-weight: 700;
            line-height: 1.2;
        }

        .brand-text p {
            font-size: 11px;
            color: #8C94A3;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* Tab Switching */
        .tab-container {
            display: flex;
            background: #F4F5F7;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            border: none;
            background: none;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #6C757D;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: #ffffff;
            color: #1F2937;
            box-shadow: 0px 2px 6px rgba(0, 0, 0, 0.04);
        }

        /* Forms */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: #4B5563;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #E5E7EB;
            border-radius: 12px;
            font-size: 14px;
            color: #1F2937;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #D32F2F;
        }

        /* Submit Button */
        .submit-btn {
            background: #D32F2F;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #B71C1C;
        }

        /* Demo Info Box */
        .demo-box {
            background: #FFF0F0;
            border-radius: 14px;
            padding: 16px;
            margin-top: 24px;
            font-size: 12px;
        }

        .demo-box h3 {
            font-size: 13px;
            color: #1F2937;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .demo-box p {
            color: #4B5563;
            margin-bottom: 6px;
            line-height: 1.5;
        }

        .demo-box span {
            color: #E53935;
        }

        .badge {
            background: #FFEBEE;
            color: #C62828;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }

        /* Utilities */
        .hidden {
            display: none !important;
        }

        .alert-box {
            background: #FFEBEE;
            color: #C62828;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            border: 1px solid #FFCDD2;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/" class="nav-brand">
            <span class="nav-logo">🎓</span>
            <div class="nav-brand-text">
                <h1>EduBrain</h1>
                <p>TELKOM UNIVERSITY</p>
            </div>
        </a>
    </nav>

    <div class="page-content">
        <div class="auth-container">
            <div class="brand-header">
                <span class="brand-logo">🎓</span>
                <div class="brand-text">
                    <h1>EduBrain</h1>
                    <p>LEARNING PLATFORM</p>
                </div>
            </div>

            <div class="tab-container">
                <button id="tab-signin" class="tab-btn active" onclick="switchTab('signin')">Sign In</button>
                <button id="tab-register" class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <div id="error-alert" class="alert-box hidden"></div>

            <form id="form-signin" class="auth-form" onsubmit="handleSignIn(event)">
                <div class="input-group">
                    <label for="signin-email">Email *</label>
                    <input type="email" id="signin-email" placeholder="your@email.com" required>
                </div>
                <div class="input-group">
                    <label for="signin-password">Password *</label>
                    <input type="password" id="signin-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="submit-btn">Sign In</button>
            </form>

            <form id="form-register" class="auth-form hidden" onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label for="reg-name">Full Name *</label>
                    <input type="text" id="reg-name" placeholder="Your full name" required>
                </div>
                <div class="input-group">
                    <label for="reg-phone">Phone</label>
                    <input type="text" id="reg-phone" placeholder="e.g. 08123456789">
                </div>
                <div class="input-group">
                    <label for="reg-address">Address</label>
                    <input type="text" id="reg-address" placeholder="City / Address">
                </div>
                <div class="input-group">
                    <label for="reg-email">Email *</label>
                    <input type="email" id="reg-email" placeholder="your@email.com" required>
                </div>
                <div class="input-group">
                    <label for="reg-password">Password *</label>
                    <input type="password" id="reg-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="submit-btn">Create Account</button>
            </form>

            <div class="demo-box">
                <h3>Demo accounts:</h3>
                <p><strong>Admin:</strong> <span>admin@edubrain.id</span> / <code class="badge">admin123</code></p>
                <p><strong>Student:</strong> <span>fasya@edubrain.id</span> / <code class="badge">student123</code></p>
            </div>
        </div>
    </div>

    <script>
        const GRAPHQL_URL = window.location.origin + '/auth/graphql';
        function switchTab(type) {
            const tabSignIn = document.getElementById('tab-signin');
            const tabRegister = document.getElementById('tab-register');
            const formSignIn = document.getElementById('form-signin');
            const formRegister = document.getElementById('form-register');
            document.getElementById('error-alert').classList.add('hidden');

            if (type === 'signin') {
                tabSignIn.classList.add('active');
                tabRegister.classList.remove('active');
                formSignIn.classList.remove('hidden');
                formRegister.classList.add('hidden');
            } else {
                tabSignIn.classList.remove('active');
                tabRegister.classList.add('active');
                formSignIn.classList.add('hidden');
                formRegister.classList.remove('hidden');
            }
        }

        function showAlert(message) {
            const alertBox = document.getElementById('error-alert');
            alertBox.textContent = message;
            alertBox.classList.remove('hidden');
        }

        async function handleSignIn(event) {
            event.preventDefault();
            const email = document.getElementById('signin-email').value;
            const password = document.getElementById('signin-password').value;

            const query = `
                mutation Login($email: String!, $password: String!) {
                    login(email: $email, password: $password) {
                        token
                        user { id name email role }
                    }
                }
            `;

            try {
                const response = await fetch(GRAPHQL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, variables: { email, password } })
                });

                const result = await response.json();
                if (result.errors) {
                    showAlert(result.errors[0].message);
                } else {
                    const { token, user } = result.data.login;
                    localStorage.setItem('token', token);
                    localStorage.setItem('user', JSON.stringify(user));
                    window.location.href = '/'; 
                }
            } catch (err) {
                showAlert('Server authentication error. Please try again.');
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value || null;
            const address = document.getElementById('reg-address').value || null;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            const query = `
                mutation Register($name: String!, $email: String!, $password: String!, $phone: String, $address: String) {
                    register(name: $name, email: $email, password: $password, phone: $phone, address: $address) {
                        token
                        user { id name email role }
                    }
                }
            `;

            try {
                const response = await fetch(GRAPHQL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, variables: { name, email, password, phone, address } })
                });

                const result = await response.json();
                if (result.errors) {
                    showAlert(result.errors[0].message);
                } else {
                    const { token, user } = result.data.register;
                    localStorage.setItem('token', token);
                    localStorage.setItem('user', JSON.stringify(user));
                    window.location.href = '/';
                }
            } catch (err) {
                showAlert('Failed to sign up. Connection dropped.');
            }
        }
    </script>
</body>
</html>
