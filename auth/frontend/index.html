<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBrain - Authentication Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel-bg: rgba(30, 41, 59, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --accent-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 2.5rem;
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            position: relative;
            overflow: hidden;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 150px;
            height: 150px;
            background: var(--accent);
            filter: blur(80px);
            opacity: 0.15;
            border-radius: 50%;
            pointer-events: none;
        }

        .brand-section {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .tabs {
            display: flex;
            background: rgba(15, 23, 42, 0.4);
            padding: 0.35rem;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
        }

        .tab {
            flex: 1;
            padding: 0.6rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.25s ease;
            color: var(--text-secondary);
        }

        .tab.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .btn-submit {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.85rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 20px var(--accent-glow);
            transform: translateY(-1px);
        }

        .alert {
            padding: 0.85rem 1rem;
            border-radius: 10px;
            font-size: 0.9rem;
            display: none;
            text-align: center;
        }
        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #a7f3d0;
        }

        .guest-notice {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="brand-section">
            <div class="logo">EduBrain Portal</div>
            <div class="subtitle" id="portal-sub">Sign in to access your modules</div>
        </div>

        <div id="alert-box" class="alert"></div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" required placeholder="e.g. fasya@edubrain.id">
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">Login Account</button>
        </form>

        <!-- Register Form (Students Only) -->
        <form id="register-form" class="auth-form" onsubmit="handleRegister(event)" style="display: none;">
            <div class="form-group">
                <label for="reg-name">Full Name</label>
                <input type="text" id="reg-name" required placeholder="e.g. Fasya Arinal">
            </div>
            <div class="form-group">
                <label for="reg-email">Email Address</label>
                <input type="email" id="reg-email" required placeholder="e.g. fasya@edubrain.id">
            </div>
            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label for="reg-phone">Phone Number</label>
                <input type="text" id="reg-phone" placeholder="e.g. 0812345678">
            </div>
            <div class="form-group">
                <label for="reg-address">Home Address</label>
                <input type="text" id="reg-address" placeholder="e.g. Bandung">
            </div>
            <button type="submit" class="btn-submit">Register Account</button>
        </form>

        <div class="guest-notice" id="credentials-tip">
            💡 Admin: <code>admin@edubrain.id</code> / <code>admin123</code><br>
            💡 Student: <code>fasya@edubrain.id</code> / <code>student123</code>
        </div>
    </div>

    <script>
        const GRAPHQL_URL = '/auth/graphql'; // gateway path proxying to port 5001

        // Check if already logged in, redirect to Gateway
        if (localStorage.getItem('token')) {
            window.location.href = '/';
        }

        // Switch login/register tabs
        function switchTab(mode) {
            const tabs = document.querySelectorAll('.tab');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const sub = document.getElementById('portal-sub');
            const tip = document.getElementById('credentials-tip');

            if (mode === 'login') {
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
                loginForm.style.display = 'flex';
                registerForm.style.display = 'none';
                sub.textContent = 'Sign in to access your modules';
                tip.style.display = 'block';
            } else {
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
                loginForm.style.display = 'none';
                registerForm.style.display = 'flex';
                sub.textContent = 'Register a new student account';
                tip.style.display = 'none';
            }
        }

        function showAlert(message, type = 'error') {
            const box = document.getElementById('alert-box');
            box.textContent = message;
            box.className = `alert alert-${type}`;
            box.style.display = 'block';
        }

        // Fetch GraphQL Utility
        async function fetchGraphQL(query, variables = {}) {
            try {
                const response = await fetch(GRAPHQL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, variables })
                });
                const result = await response.json();
                if (result.errors) {
                    throw new Error(result.errors[0].message);
                }
                return result.data;
            } catch (err) {
                showAlert(err.message, 'error');
                console.error(err);
            }
        }

        // Handle Login Submission
        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const query = `
                mutation Login($email: String!, $password: String!) {
                    login(email: $email, password: $password) {
                        token
                        user {
                            id
                            name
                            email
                            role
                        }
                    }
                }
            `;

            const data = await fetchGraphQL(query, { email, password });
            if (data && data.login) {
                showAlert('Login successful! Redirecting...', 'success');
                localStorage.setItem('token', data.login.token);
                localStorage.setItem('user', JSON.stringify(data.login.user));
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            }
        }

        // Handle Register Submission
        async function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const phone = document.getElementById('reg-phone').value;
            const address = document.getElementById('reg-address').value;

            const query = `
                mutation Register($name: String!, $email: String!, $password: String!, $phone: String, $address: String) {
                    register(name: $name, email: $email, password: $password, phone: $phone, address: $address) {
                        token
                        user {
                            id
                            name
                            email
                            role
                        }
                    }
                }
            `;

            const data = await fetchGraphQL(query, { name, email, password, phone, address });
            if (data && data.register) {
                showAlert('Account registered! Profile synchronized.', 'success');
                localStorage.setItem('token', data.register.token);
                localStorage.setItem('user', JSON.stringify(data.register.user));
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            }
        }
    </script>
</body>
</html>
